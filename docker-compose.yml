version: "3.9"

# Local development orchestration.
# Production uses Vercel (frontend) + Render/Railway/Fly (backend) — this is just for local.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: call-analysis-backend
    ports:
      - "8007:8007"
    environment:
      PORT: 8007
      HOST: 0.0.0.0
      ALLOWED_ORIGINS: "http://localhost:8080,http://localhost:5173"
      # Credentials read from .env file — copy backend/.env.example → backend/.env first
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-12-01-preview}
      AZURE_DEPLOYMENT: ${AZURE_DEPLOYMENT:-gpt-4o-mini}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: call-analysis-frontend
    ports:
      - "8080:80"
    environment:
      VITE_CALL_ANALYSIS_API_URL: ${VITE_CALL_ANALYSIS_API_URL:-http://localhost:8007}
    depends_on:
      - backend
    restart: unless-stopped
