# Railway.app deploy config.
# Usage:
#   1. Push the repo to GitHub.
#   2. railway login + railway link to your project (root: backend/)
#   3. Set the required env vars in Railway dashboard or via `railway variables set`:
#         ELEVENLABS_API_KEY, AZURE_OPENAI_API_KEY, AZURE_OPENAI_ENDPOINT,
#         AZURE_OPENAI_API_VERSION, AZURE_DEPLOYMENT, ALLOWED_ORIGINS
#   4. railway up
# Railway auto-injects PORT.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "uvicorn api:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
